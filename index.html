<!doctype html>
<html lang="ko">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Welcom to my PORTFOLIO</title>
    <link rel="icon" href="favicon.ico" sizes="any" />
    <link rel="stylesheet" href="assets/css/style.css" />
  </head>
  <body>
    <header class="topbar">
      <a class="brand" href="/" aria-label="Home">
        <img src="assets/img/Logo.png" alt="HH" class="brand-logo" />
      </a>

      <!-- 다운로드 링크: assets/files/sample.pdf 를 원하는 파일로 교체 -->
      <a class="download" href="assets/files/Encrypted_Portfolio.E01" download>
        <span>Download file</span>
        <img
          src="assets/img/download.png"
          alt=""
          class="download-img"
          aria-hidden="true"
        />
      </a>
    </header>

    <main class="stage">
      <div class="hero">
        <p class="kicker">WELCOME</p>
        <h1 class="headline">
          Welcome to my <span class="accent">PORTFOLIO</span>
        </h1>
        <p class="lead">
          Download the key file, then drag & drop it to unlock.
        </p>
      </div>
      <section
        class="dropzone"
        id="dropzone"
        tabindex="0"
        aria-label="File drop area"
      >
        <div class="dropzone-inner">
          <div class="file-icon" aria-hidden="true">
            <!-- 심플 파일+다운 아이콘 (SVG) -->
            <svg width="44" height="44" viewBox="0 0 24 24" fill="none">
              <path
                d="M14 2H7a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h10a2 2 0 0 0 2-2V7l-5-5Z"
                stroke="currentColor"
                stroke-width="1.5"
              />
              <path d="M14 2v5h5" stroke="currentColor" stroke-width="1.5" />
              <path
                d="M12 11v7"
                stroke="currentColor"
                stroke-width="1.5"
                stroke-linecap="round"
              />
              <path
                d="M9.5 15.5 12 18l2.5-2.5"
                stroke="currentColor"
                stroke-width="1.5"
                stroke-linecap="round"
                stroke-linejoin="round"
              />
            </svg>
          </div>

          <p class="hint">Drag&Drop file here</p>
          <p class="subhint" id="subhint">또는 클릭해서 파일 선택</p>

          <!-- 실제 파일 선택 input (숨김) -->
          <input id="fileInput" class="file-input" type="file" />
          <div class="loader" id="loader" aria-hidden="true">
            <div class="spinner"></div>
            <p class="loading-text">File Decrypting...</p>
          </div>
        </div>
      </section>
    </main>

    <script src="assets/js/main.js"></script>
  </body>
</html>
