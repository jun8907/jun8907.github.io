<!doctype html>
<html lang="ko">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>Junhee's BLOG</title>
    <link rel="icon" href="../favicon.ico" sizes="any" />
    <link rel="stylesheet" href="assets/css/blog.css" />
  </head>
  <body>
    <header class="topbar">
      <a class="brand" href="../portfolio/" aria-label="Back to home">
        <img
          id="brandLogo"
          class="brand-logo"
          src="../assets/img/Logo.png"
          data-light="../assets/img/Logo.png"
          data-dark="../assets/img/Logo_white.png"
          alt="HJ"
        />
      </a>

      <div class="top-actions">
        <div class="search">
          <input
            id="searchInput"
            type="search"
            placeholder="검색 (제목, 요약, 태그)"
          />
        </div>
        <button class="mode-btn" id="modeBtn" type="button">Dark</button>
      </div>
    </header>

    <main class="page">
      <section class="wrap">
        <div class="page-head">
          <div>
            <h1 class="title">Blog</h1>
            <p class="subtitle">기술 블로그</p>
          </div>
        </div>

        <!-- Empty state -->
        <section class="empty" id="emptyState">
          <div class="empty-badge">EMPTY • BLOG</div>
          <h2 class="empty-title">아직 작성된 포스트가 없어요</h2>
          <p class="empty-desc">
            첫 글을 추가하면 여기에서 최신 글이 자동으로 리스트업됩니다.
            검색창으로 제목/요약/태그를 빠르게 찾을 수 있어요.
          </p>
        </section>

        <!-- Post list (나중에 사용) -->
        <section class="posts" id="postList" hidden></section>
      </section>
    </main>

    <script src="assets/js/blog.js"></script>
  </body>
</html>
