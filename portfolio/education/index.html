<!doctype html>
<html lang="ko">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>Education | Portfolio</title>
    <link rel="icon" href="../favicon.ico" sizes="any" />
    <link rel="stylesheet" href="assets/css/education.css" />
  </head>
  <body>
    <!-- (선택) 상단바를 완전히 빼고 싶으면 header 자체를 삭제하면 됨 -->
    <header class="topbar">
      <a class="brand" href="../" aria-label="Back to portfolio">
        <img
          id="brandLogo"
          src="../img/Logo.png"
          data-light="../img/Logo.png"
          data-dark="../img/Logo_white.png"
          alt="HJ"
          class="brand-logo"
        />
      </a>

      <nav class="topnav" aria-label="Portfolio sections">
        <a class="topnav-link is-active" href="./">Education</a>
        <a class="topnav-link" href="../projects/">Projects</a>
        <a class="topnav-link" href="../awards/">Awards</a>
        <a class="topnav-link" href="../papers/">Papers</a>
      </nav>

      <button class="mode-btn" id="modeBtn" type="button">Dark</button>

    <main class="page">
      <section class="wrap">
        <h1 class="title">Education</h1>
        <div class="rule"></div>

        <div class="row">
          <div class="left">
            <div class="date">2022년 03월 ~ 2026년 08월</div>
            <div class="name">중부대학교 정보보호학전공</div>

        </div>

        <div class="row-rule"></div>

        <div class="row">
          <div class="left">
            <div class="date">2024년 03월 ~ 2024년 12월</div>
            <div class="name">중부대학교 정보보안 SW융합전공</div>

          <div class="right">
            <img class="logo" src="../img/joongbu.png" alt="화이트햇 스쿨" />
          </div>
        </div>

        <div class="rule"></div>

        <div class="row">
          <div class="left">
            <div class="date">2025년 03월 ~ 2025년 09월</div>
            <div class="name">화이트햇 스쿨 3기</div>
            <div class="meta">수료</div>
          </div>
          <div class="right">
            <img class="logo" src="../img/whitehat.jpeg" alt="화이트햇 스쿨" />
          </div>
        </div>

        <div class="row-rule"></div>

        <div class="row">
          <div class="left">
            <div class="date">2019년 03월 ~ 2022년 02월</div>
            <div class="name">발곡고등학교</div>
            <div class="meta">졸업</div>
          </div>
          <div class="right"></div>
        </div>

        <div class="row-rule"></div>
      </section>
    </main>

    <script src="assets/js/education.js"></script>
